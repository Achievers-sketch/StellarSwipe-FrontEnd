openapi: "3.1.0"
info:
  title: StellarSwipe API
  version: "1.0.0"
  description: Backend API for the StellarSwipe signal-feed and subscriptions.

paths:
  /api/signals:
    get:
      operationId: getSignals
      summary: List paginated signals
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        "200":
          description: Paginated signal feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalFeedPage"
        "400":
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/subscriptions:
    get:
      operationId: getSubscriptions
      summary: List subscriptions, optionally filtered by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SubscriptionStatus"
      responses:
        "200":
          description: Subscription list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsResponse"
        "400":
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    SignalAction:
      type: string
      enum: [BUY, SELL, HOLD]

    SignalStatus:
      type: string
      enum: [Active, Waiting, Closed]

    Signal:
      type: object
      required: [id, ticker, action, confidence, details, timestamp]
      properties:
        id:
          type: string
        ticker:
          type: string
        action:
          $ref: "#/components/schemas/SignalAction"
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        details:
          type: string
        timestamp:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        provider:
          type: string
        status:
          $ref: "#/components/schemas/SignalStatus"

    SignalFeedPage:
      type: object
      required: [items, page, pageSize, total, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        nextPage:
          type: integer
          nullable: true
        hasMore:
          type: boolean

    SubscriptionStatus:
      type: string
      enum: [active, inactive, pending, cancelled, expired]

    Subscription:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/SubscriptionStatus"

    SubscriptionsResponse:
      type: object
      required: [subscriptions]
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
